kind = "data-app"
previewPath = "/"
title = "Dashboard ML Issues"
version = "1.0.0"
id = "artifacts/ml-dashboard"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19109

[services.development]
run = "pnpm --filter @workspace/ml-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ml-dashboard", "run", "build" ]
publicDir = "artifacts/ml-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19109"
BASE_PATH = "/"
